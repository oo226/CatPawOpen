name: Check Upstream Douer

# 只检测上游是否更新，不自动合入 vendor。
# 原因：douer minify 符号会变，盲目刷新会弄坏 cmshub 补丁。

on:
  schedule:
    - cron: '0 8 * * *' # 每天 UTC 08:00
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compare vendor md5 with upstream
        id: check
        working-directory: nodejs
        run: node scripts/check-upstream.mjs

      - name: Open or refresh issue when upstream changed
        if: steps.check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '上游 douer 有更新，请手动跟版';
            const local = '${{ steps.check.outputs.local }}';
            const remote = '${{ steps.check.outputs.remote }}';
            const body = [
              '定时检测发现 Darklessing/catvod `douer/index.js` 与本地 vendor 不一致。',
              '',
              `| | md5 |`,
              `|---|---|`,
              `| 本地 vendor | \`${local}\` |`,
              `| 上游最新 | \`${remote}\` |`,
              '',
              '**不要自动合入。** minify 符号变化会弄坏 `copy-runtime.mjs` 的 cmshub 补丁。',
              '',
              '建议步骤：',
              '1. `cd nodejs && npm run vendor:refresh`',
              '2. 更新 `scripts/copy-runtime.mjs` 锚点（CMS foreach / Hce fallback / server inject）',
              '3. `npm run build && node scripts/test-patched-runtime.cjs`',
              '4. 验证仍只有 1 个「采」采集、无电影天堂',
              '5. 提交并部署 `dist`',
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50,
            });
            const existing = issues.data.find((i) => i.title === title);
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'upstream-douer',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'upstream-douer',
                color: 'FBCA04',
                description: 'Upstream Darklessing/catvod douer update available',
              });
            }
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `再次检测到差异：\n\n本地 \`${local}\` → 上游 \`${remote}\`\n\n${new Date().toISOString()}`,
              });
              core.info(`commented on #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['upstream-douer'],
              });
              core.info(`opened #${created.data.number}`);
            }

      - name: Fail soft summary
        if: failure()
        run: |
          echo "upstream check failed (network?). Will retry next schedule."
          exit 0
